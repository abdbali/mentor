<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcfbfe;
            --primary: #7c3aed;
            --primary-light: #f5f3ff;
            --text-dark: #1e1b4b;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --gradient: linear-gradient(135deg, #7c3aed, #a78bfa);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            width: 550px;
            max-height: 600px;
            overflow-y: auto;
            padding: 1.2rem;
            background-image: radial-gradient(at 0% 0%, rgba(245, 243, 255, 0.5) 0px, transparent 50%);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.8rem;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            background: var(--gradient);
            border-radius: 50%;
        }

        .badge {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 99px;
            border: 1px solid rgba(124, 58, 237, 0.15);
        }

        /* Giriş Kutusu */
        .input-container {
            position: relative;
            background: #ffffff;
            border: 2px solid #e9d5ff;
            border-radius: 12px;
            padding: 4px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.05);
            margin-bottom: 1rem;
        }

        .input-container input {
            width: 100%;
            border: none;
            outline: none;
            padding: 10px 14px;
            font-size: 0.95rem;
            color: var(--text-dark);
            background: transparent;
        }

        .submit-btn {
            background: var(--gradient);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .submit-btn:hover {
            transform: scale(1.05);
        }

        /* Test Çipleri */
        .test-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        
        .test-chip {
            background: white;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 99px;
            font-size: 0.8rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .test-chip:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }

        /* Sonuç Paneli */
        .output-section {
            display: none;
            text-align: left;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Sihirbaz */
        .interactive-wizard {
            background: #faf8ff;
            border: 1px dashed #c084fc;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .wizard-row {
            margin-bottom: 0.8rem;
        }

        .wizard-row:last-child {
            margin-bottom: 0;
        }

        .wizard-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 6px;
            display: block;
        }

        .pill-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .pill-btn {
            background: white;
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .pill-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .wizard-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.85rem;
            outline: none;
        }

        .wizard-input:focus {
            border-color: var(--primary);
        }

        .feedback-box {
            background: #fdfaf2;
            border: 1px solid #fef3c7;
            border-radius: 12px;
            padding: 1rem;
            color: #92400e;
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .improved-box {
            background: var(--primary-light);
            border: 1px solid rgba(124, 58, 237, 0.12);
            border-radius: 12px;
            padding: 1rem;
            position: relative;
        }

        .improved-text {
            color: var(--text-dark);
            font-size: 0.85rem;
            line-height: 1.5;
            white-space: pre-line;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: white;
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }

        .copy-btn:hover {
            background: var(--primary);
            color: white;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"><div class="logo-dot"></div>Mentor</div>
        <span class="badge">Eğitim Asistanı</span>
    </div>

    <!-- Giriş Alanı -->
    <div class="input-container">
        <input type="text" id="promptInput" placeholder="Aklınızdaki fikri yazın...">
        <button class="submit-btn" id="submitBtn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </div>

    <!-- Hızlı Çipler -->
    <div class="test-chips">
        <span class="test-chip" data-text="Fen Bilimleri sınavı">🔬 Fen Sınavı (Eksik)</span>
        <span class="test-chip" data-text="8. Sınıf LGS Matematik üslü sayılar yeni nesil 10 soru">📐 LGS Mat (Tam)</span>
        <span class="test-chip" data-text="Türkçe okuma metni istiyorum">📝 Türkçe Okuma (Eksik)</span>
    </div>

    <!-- SONUÇ EKRANI -->
    <section class="output-section" id="outputSection">
        
        <!-- Akıllı Sihirbaz -->
        <div id="wizardContainer" class="interactive-wizard" style="display: none;">
            <div class="card-title" style="color: var(--primary); margin-bottom: 8px;">🛠️ Eksik Bilgileri Tamamlayın</div>
            
            <div class="wizard-row" id="rowTopic" style="display: none;">
                <label class="wizard-label">Özel Bir Konu / Kazanım:</label>
                <input type="text" id="wizTopicInput" class="wizard-input" placeholder="Örn: Çarpanlar ve Katlar, Fotosentez">
            </div>

            <div class="wizard-row" id="rowGrade" style="display: none;">
                <label class="wizard-label">Sınıf Seviyesi Seçin:</label>
                <div class="pill-group" id="wizGradePills">
                    <button class="pill-btn" data-val="5. Sınıf">5. Sınıf</button>
                    <button class="pill-btn" data-val="6. Sınıf">6. Sınıf</button>
                    <button class="pill-btn" data-val="7. Sınıf">7. Sınıf</button>
                    <button class="pill-btn" data-val="8. Sınıf (LGS)">8. Sınıf (LGS)</button>
                    <button class="pill-btn" data-val="Lise (TYT/AYT)">Lise</button>
                </div>
            </div>

            <div class="wizard-row" id="rowCount" style="display: none;">
                <label class="wizard-label">Soru / Etkinlik Sayısı:</label>
                <div class="pill-group" id="wizCountPills">
                    <button class="pill-btn" data-val="3 Adet">3 Soru</button>
                    <button class="pill-btn" data-val="5 Adet">5 Soru</button>
                    <button class="pill-btn" data-val="10 Adet">10 Soru</button>
                    <button class="pill-btn" data-val="Kapsamlı bir çalışma">Belirtme</button>
                </div>
            </div>
        </div>

        <div class="card-title" style="color: #b45309;">💡 Mentor Notu</div>
        <div class="feedback-box" id="feedbackContent"></div>

        <div class="card-title" style="color: var(--primary);">✨ Hazır Prompt</div>
        <div class="improved-box">
            <button class="copy-btn" id="copyBtn">Kopyala</button>
            <div class="improved-text" id="improvedContent"></div>
        </div>
    </section>

    <!-- Chrome CSP ile uyumlu harici JS dosyası bağlantısı -->
    <script src="popup.js"></script>
</body>
</html>
